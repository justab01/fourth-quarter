<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Fourth Quarter Phone Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #17202a;
      --panel: #213040;
      --panel-2: #263648;
      --line: rgba(255, 198, 126, 0.18);
      --text: #f4eee5;
      --muted: #b8b5ad;
      --accent: #f2a65a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      gap: 18px;
      padding: 22px;
      background:
        linear-gradient(135deg, rgba(242, 166, 90, 0.22), transparent 36%),
        linear-gradient(160deg, #17202a, #1d2936 46%, #253242);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .toolbar {
      width: min(100%, 720px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(33, 48, 64, 0.86);
      box-shadow: 0 18px 48px rgba(13, 19, 26, 0.34);
      backdrop-filter: blur(18px);
    }
    button {
      min-height: 36px;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0 14px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }
    button.active {
      color: #17202a;
      background: var(--accent);
      border-color: rgba(255, 248, 232, 0.26);
    }
    .stage {
      width: min(100%, calc(var(--device-w) + 72px));
      display: grid;
      place-items: center;
    }
    .phone {
      width: min(var(--device-w), calc(100vw - 44px));
      aspect-ratio: var(--device-w) / var(--device-h);
      padding: 14px;
      border-radius: calc(var(--radius) + 16px);
      background:
        linear-gradient(145deg, rgba(255,255,255,0.24), transparent 20%),
        linear-gradient(145deg, #0d131a, #263648);
      box-shadow: 0 28px 70px rgba(13, 19, 26, 0.62);
    }
    .screen {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 1px solid rgba(255, 248, 232, 0.16);
      border-radius: var(--radius);
      background: #17202a;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #17202a;
    }
  </style>
</head>
<body>
  <div class="toolbar" aria-label="Device preview selector">
    <button data-w="393" data-h="852" data-radius="42">iPhone 15</button>
    <button data-w="440" data-h="956" data-radius="46" class="active">iPhone 16 Pro Max</button>
    <button data-w="384" data-h="854" data-radius="34">Galaxy S24</button>
  </div>
  <main class="stage">
    <div class="phone">
      <div class="screen">
        <iframe src="http://localhost:8082/?dev_skip_onboarding=1" title="The Fourth Quarter app preview"></iframe>
      </div>
    </div>
  </main>
  <script>
    const root = document.documentElement;
    const buttons = [...document.querySelectorAll("button")];

    function setDevice(button) {
      buttons.forEach((item) => item.classList.toggle("active", item === button));
      root.style.setProperty("--device-w", `${button.dataset.w}px`);
      root.style.setProperty("--device-h", `${button.dataset.h}px`);
      root.style.setProperty("--radius", `${button.dataset.radius}px`);
    }

    buttons.forEach((button) => button.addEventListener("click", () => setDevice(button)));
    setDevice(document.querySelector("button.active"));
  </script>
</body>
</html>
